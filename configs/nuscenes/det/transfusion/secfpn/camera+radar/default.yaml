input_modality:
  use_lidar: false
  use_radar: true

model:
  encoders:
    lidar: null
    camera:
      neck:
        type: GeneralizedLSSFPN
        in_channels: [512, 1024, 2048]
        out_channels: 256
        start_level: 0
        num_outs: 3
        norm_cfg:
          type: BN2d
          requires_grad: true
        act_cfg:
          type: ReLU
          inplace: true
        upsample_cfg:
          mode: bilinear
          align_corners: false
      vtransform:
        type: DepthLSSTransform
        in_channels: 256
        out_channels: 80
        image_size: ${image_size}
        feature_size: ${[image_size[0] // 8, image_size[1] // 8]}
        xbound: [-51.2, 51.2, 0.4]
        ybound: [-51.2, 51.2, 0.4]
        zbound: [-10.0, 10.0, 20.0]
        dbound: [1.0, 60.0, 0.5]
        downsample: 2
        use_points: radar
        depth_input: scalar
        add_depth_features: false
    radar:
      voxelize_reduce: false
      voxelize:
        max_num_points: 20
        point_cloud_range: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
        voxel_size: [0.8, 0.8, 8]
        max_voxels: [30000, 60000]
      backbone:
        type: RadarEncoder
        pts_voxel_encoder:
          type: RadarFeatureNet
          in_channels: 45
          feat_channels: [128, 128, 128, 64]
          with_distance: false
          point_cloud_range: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
          voxel_size: [0.8, 0.8, 8]
          norm_cfg:
            type: BN1d
            eps: 1.0e-3
            momentum: 0.01
        pts_middle_encoder:
          type: PointPillarsScatter
          in_channels: 64
          output_shape: [128, 128]
        pts_bev_encoder: null

lr_config: null

optimizer:
  lr: 2.0e-4

max_epochs: 6
